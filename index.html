<!DOCTYPE html>
<html>
<head>
  <title>AI Assistant</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f4f4f4;
      padding: 50px;
    }
    h1 { color: #333; }
    input {
      padding: 10px;
      width: 300px;
    }
    button {
      padding: 10px;
      background: black;
      color: white;
      border: none;
    }
    #response {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h1>AI Assistant</h1>
  <p>Ask anything:</p>

  <input id="userInput" placeholder="Type something..." />
  <button onclick="reply()">Ask</button>

  <div id="response"></div>

  <script>
    function reply() {
      let input = document.getElementById("userInput").value;
      document.getElementById("response").innerText =
        "You asked: " + input + ". This is a simple AI-style response.";
    }
  </script>

</body>
</html>
