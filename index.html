<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #0f172a, #020617);
            color: white;
            text-align: center;
            margin: 0;
        }

        h1 {
            margin-top: 30px;
            font-size: 40px;
        }

        p.subtitle {
            opacity: 0.7;
            margin-bottom: 20px;
        }

        #chatBox {
            width: 60%;
            margin: 20px auto;
            background: rgba(30, 41, 59, 0.8);
            padding: 20px;
            border-radius: 12px;
            height: 350px;
            overflow-y: auto;
            text-align: left;
            box-shadow: 0 0 25px rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
        }

        .user, .bot {
            padding: 10px;
            border-radius: 10px;
            margin: 8px 0;
            display: inline-block;
            max-width: 80%;
        }

        .user {
            background: #0ea5e9;
            align-self: right;
        }

        .bot {
            background: #22c55e;
        }

        #inputArea {
            margin-top: 20px;
        }

        input {
            padding: 12px;
            width: 300px;
            border-radius: 5px;
            border: none;
        }

        button {
            padding: 12px;
            margin-left: 10px;
            border: none;
            background: #22c55e;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #16a34a;
        }

        /* 🔥 Typing animation */
        .typing span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
    </style>
</head>

<body>

    <h1>AI Assistant 🤖</h1>
    <p class="subtitle">A simple AI chatbot built using JavaScript</p>

    <div id="chatBox"></div>

    <div id="inputArea">
        <input type="text" id="userInput" placeholder="Ask me anything..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="clearChat()">Clear</button>
    </div>

    <script>
        document.getElementById("userInput").focus();

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") {
                sendMessage();
            }
        });

        function sendMessage() {
            let input = document.getElementById("userInput").value;
            if (input.trim() === "") return;

            let chatBox = document.getElementById("chatBox");

            chatBox.innerHTML += "<p class='user'><b>You:</b> " + input + "</p>";

            let botMessage = document.createElement("p");
            botMessage.className = "bot";

            botMessage.innerHTML = "<b>AI:</b> <span class='typing'><span></span><span></span><span></span></span>";
            chatBox.appendChild(botMessage);

            let response = getAIResponse(input);

            setTimeout(() => {
                botMessage.innerHTML = "<b>AI:</b> " + response;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1200);

            document.getElementById("userInput").value = "";
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        function getAIResponse(input) {
            input = input.toLowerCase();

            if (input.includes("hello") || input.includes("hi")) {
                return "Hello! 👋 How can I help you today?";
            }
            if (input.includes("how are you")) {
                return "I'm doing great! Thanks for asking 😄";
            }
            if (input.includes("ai")) {
                return "AI stands for Artificial Intelligence — it allows machines to think and respond like humans.";
            }
            if (input.includes("project")) {
                return "This project demonstrates a simple AI chatbot with interaction and UI design.";
            }

            return "That's interesting! I'm still learning, but tell me more 😊";
        }

        function clearChat() {
            document.getElementById("chatBox").innerHTML = "";
        }
    </script>

</body>
</html>
