<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            color: white;
            text-align: center;
            background: url("bg.jpg.jpg") no-repeat center center fixed;
            background-size: cover;
        }

        /* 🌑 Dark overlay */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0,0,0,0.6), rgba(0,0,0,0.9));
            z-index: -1;
        }

        h1 {
            margin-top: 30px;
            font-size: 42px;
            text-shadow: 0 0 10px #00f7ff;
        }

        .subtitle {
            opacity: 0.8;
            margin-bottom: 10px;
        }

        /* 💬 Chat box */
        #chatBox {
            width: 60%;
            margin: 20px auto;
            padding: 20px;
            height: 350px;
            overflow-y: auto;
            text-align: left;

            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 25px rgba(0,255,255,0.2);
        }

        .user, .bot {
            padding: 10px;
            border-radius: 12px;
            margin: 8px 0;
            display: inline-block;
            max-width: 75%;
        }

        .user {
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            box-shadow: 0 0 10px #3b82f6;
        }

        .bot {
            background: linear-gradient(135deg, #22c55e, #4ade80);
            box-shadow: 0 0 10px #22c55e;
        }

        /* Input */
        input {
            padding: 12px;
            width: 280px;
            border-radius: 6px;
            border: none;
            outline: none;
        }

        button {
            padding: 12px;
            margin-left: 10px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #f97316);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            box-shadow: 0 0 10px #f97316;
        }

        button:hover {
            transform: scale(1.05);
        }

        /* 🔥 typing dots */
        .typing span {
            display: inline-block;
            width: 6px;
            height: 6px;
            margin: 0 2px;
            background: white;
            border-radius: 50%;
            animation: blink 1.4s infinite;
        }

        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }

        /* ✨ floating glow particles */
        .glow {
            position: fixed;
            width: 6px;
            height: 6px;
            background: cyan;
            border-radius: 50%;
            animation: float 6s infinite linear;
            opacity: 0.6;
        }

        @keyframes float {
            from { transform: translateY(100vh); }
            to { transform: translateY(-10vh); }
        }
    </style>
</head>

<body>

    <h1>AI Assistant 🤖</h1>
    <p class="subtitle">Next-gen interactive chatbot experience</p>

    <div id="chatBox"></div>

    <div style="margin-top:20px;">
        <input id="userInput" placeholder="Ask me anything..." />
        <button onclick="sendMessage()">Send</button>
        <button onclick="clearChat()">Clear</button>
    </div>

    <script>
        document.getElementById("userInput").focus();

        document.getElementById("userInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter") sendMessage();
        });

        async function sendMessage() {
            let input = document.getElementById("userInput").value;
            if (input.trim() === "") return;

            let chatBox = document.getElementById("chatBox");

            chatBox.innerHTML += "<p class='user'><b>You:</b> " + input + "</p>";

            let botMessage = document.createElement("p");
            botMessage.className = "bot";
            botMessage.innerHTML = "<b>AI:</b> <span class='typing'><span></span><span></span><span></span></span>";
            chatBox.appendChild(botMessage);

            let response = getAIResponse(input);

            setTimeout(() => {
                botMessage.innerHTML = "<b>AI:</b> " + response;
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 1200);

            document.getElementById("userInput").value = "";
        }

        function getAIResponse(input) {
            input = input.toLowerCase();

            if (input.includes("hello") || input.includes("hi"))
                return "Hey there 👋 How can I help?";
            if (input.includes("ai"))
                return "AI lets machines think and respond intelligently.";
            if (input.includes("project"))
                return "This is a modern AI chatbot with UI and animations.";

            return "Interesting 🤔 tell me more!";
        }

        function clearChat() {
            document.getElementById("chatBox").innerHTML = "";
        }

        // ✨ generate floating particles
        for (let i = 0; i < 20; i++) {
            let dot = document.createElement("div");
            dot.className = "glow";
            dot.style.left = Math.random() * 100 + "vw";
            dot.style.animationDuration = (4 + Math.random()*6) + "s";
            document.body.appendChild(dot);
        }
    </script>

</body>
</html>
